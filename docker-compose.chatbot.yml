version: '3.8'

# Turbobujias — Chatbot Only (Simplified for local dev)
# Run just the AI chatbot without backend/frontend

services:
  chatbot:
    build:
      context: ./turbobujias-ai
      dockerfile: Dockerfile.simple
    container_name: turbobujias-chatbot
    ports:
      - "7860:7860"
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - LOG_LEVEL=INFO
      - LLM_PROVIDER=${LLM_PROVIDER:-github}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - ./turbobujias-ai/app.py:/app/app.py
      - ./turbobujias-ai/inventory.json:/app/inventory.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
