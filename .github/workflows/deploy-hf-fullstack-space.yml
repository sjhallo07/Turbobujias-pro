name: Deploy Hugging Face Full Stack Space

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'turbobujias-web/**'
      - 'turbobujias-ai/**'
      - 'deploy/huggingface-fullstack-space/**'
      - 'scripts/prepare-hf-fullstack-space.mjs'
      - 'package.json'
      - '.github/workflows/deploy-hf-fullstack-space.yml'

permissions:
  contents: read

concurrency:
  group: deploy-hf-fullstack-space
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish Docker Space bundle
    runs-on: ubuntu-latest
    environment: huggingface-space

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate Hugging Face environment configuration
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO_ID: ${{ vars.HF_SPACE_REPO_ID }}
          HF_SPACE_PUBLIC_URL: ${{ vars.HF_SPACE_PUBLIC_URL }}
        run: |
          set -euo pipefail
          test -n "$HF_TOKEN" || { echo "::error::Missing HF_TOKEN secret in the huggingface-space environment or repository."; exit 1; }
          test -n "$HF_SPACE_REPO_ID" || { echo "::error::Missing HF_SPACE_REPO_ID variable in the huggingface-space environment."; exit 1; }
          test -n "$HF_SPACE_PUBLIC_URL" || { echo "::error::Missing HF_SPACE_PUBLIC_URL variable in the huggingface-space environment."; exit 1; }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Hugging Face bundle
        run: node scripts/prepare-hf-fullstack-space.mjs

      - name: Publish bundle to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO_ID: ${{ vars.HF_SPACE_REPO_ID }}
          HF_SPACE_PUBLIC_URL: ${{ vars.HF_SPACE_PUBLIC_URL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          HF_OWNER="${HF_SPACE_REPO_ID%%/*}"
          DEPLOY_DIR="$(mktemp -d)"
          rsync -a --delete dist/hf-fullstack-space/ "$DEPLOY_DIR/"
          cd "$DEPLOY_DIR"
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No deployment changes detected"
            exit 0
          fi
          git commit -m "Deploy from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git remote add origin "https://${HF_OWNER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO_ID}"
          git push --force origin main

      - name: Show deployed public URL
        env:
          HF_SPACE_PUBLIC_URL: ${{ vars.HF_SPACE_PUBLIC_URL }}
        run: |
          echo "Expected public URL: $HF_SPACE_PUBLIC_URL"