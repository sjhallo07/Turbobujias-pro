# Turbobujias — Complete Stack (Chatbot + Frontend + Backend)
# All services with proper networking and communication

services:
  # ─────────────────────────────────────────────
  # Chatbot (Gradio + RAG)
  # ─────────────────────────────────────────────
  chatbot:
    build:
      context: ./turbobujias-ai
      dockerfile: Dockerfile.simple
    container_name: turbobujias-chatbot
    ports:
      - "0.0.0.0:7860:7860"
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - LOG_LEVEL=INFO
      - LLM_PROVIDER=${LLM_PROVIDER:-github}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - ./turbobujias-ai/app.py:/app/app.py
      - ./turbobujias-ai/inventory.json:/app/inventory.json
    networks:
      - turbobujias
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────
  # Backend API (Node.js)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: turbobujias-backend
    ports:
      - "0.0.0.0:3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - BACKEND_PUBLIC_URL=http://localhost:3001
      - FRONTEND_PUBLIC_URL=http://localhost:3000
      - CHATBOT_PUBLIC_URL=http://chatbot:7860
      - CHATBOT_INTERNAL_URL=http://chatbot:7860
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Auth
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET}
      - AUTH_SUPERADMIN_BOOTSTRAP_PASSWORD=${AUTH_SUPERADMIN_BOOTSTRAP_PASSWORD}
      - AUTH_SUPERADMIN_EMAILS=${AUTH_SUPERADMIN_EMAILS}
      # CORS
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3002,http://192.168.0.7:3000,http://192.168.0.7:3001
      # Exchange rates
      - FALLBACK_EXCHANGE_RATE=36.50
      - EXCHANGE_RATE_CACHE_TTL_HOURS=24
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    networks:
      - turbobujias
    depends_on:
      - chatbot
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: turbobujias-frontend
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:3001
      - NEXT_PUBLIC_CHATBOT_URL=http://localhost:7860
      - HF_SPACE_URL=https://sjhallo07-turbobujias-fullstack.hf.space
    volumes:
      - ./turbobujias-web:/app/turbobujias-web
      - /app/turbobujias-web/node_modules
      - /app/turbobujias-web/.next
    networks:
      - turbobujias
    depends_on:
      - backend
      - chatbot

networks:
  turbobujias:
    driver: bridge
